name: Release Build (Windows)

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Determine version, build, and optional test
        id: meta
        uses: ./.github/actions/build-and-test
        with:
          release-tag-input: ${{ github.event.release.tag_name }}
          run-tests: 'false'

      - name: Azure login and sign files
        uses: ./.github/actions/azure-sign
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name:
            ${{ secrets.AZURE_SIGNING_CERT_PROFILE_NAME }}

      - name: Collect artifacts and create ZIP bundles
        shell: pwsh
        run: ./.github/scripts/collect-artifacts-and-zip.ps1

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/zip/DisplayProber-${{ steps.meta.outputs.version_tag }}-debug.zip
            ${{ github.workspace }}/zip/DisplayProber-${{ steps.meta.outputs.version_tag }}-release.zip
